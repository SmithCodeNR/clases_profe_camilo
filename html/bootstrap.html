<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Bootstrap</title>
</head>
<body>
    <div class="bg-dark text-white p-5 text-center">
        <h1 class="display-4">hola bootstrap</h1>
        <p class="lead">diseñando sin un archivo css</p>
        <button class="btn btn-danger btn-lg mt-3">boton pro</button>
        <button class="btn btn-outline-success btn-lg mt-3">boton fantasma</button>
    </div>
    <div class="container mt-5">
        <div class="row">
            <div class="col-6 bg-primary text-white p-3 border">yo ocupo 6 columnas(mitad de la pantalla)</div>
            <div class="col-4 bg-success text-white p-3 border" >yo ocupo 4 columnas(un tercio)</div>
            <div class="col-2 bg-danger text-white p-3 border">yo ocupo 2</div>
        </div>
    </div>
    <div class="row mt-4">
        <div class="col-12 col-md-4 mb-3">
            <div class="card p-3 shadow">caja 1: se apila en movil</div>
        </div>

        <div class="col-12 col-md-4 mb-3">
            <div class="card p-3 shadow">caja 2: se apila en movil</div>
        </div>

        <div class="col-12 col-md-4 mb-3">
            <div class="card p-3 shadow">caja 3: se apila en movil</div>
        </div>
        
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
