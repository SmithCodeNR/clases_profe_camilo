<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formularios</title>
</head>
<body>
    <form action="">
        <h2>Datos personames basicos</h2>
        <label for="monbreUsuario">nombres usuario:</label>
        <input type="text" id="nombreUsuario" name="nombre" placeholder="ej: juan perez">
        <br><br>
        <label for="correoUsuario">correo electronico:</label>
        <input type="emial" id="correoUsuario" name="email" placeholder="correo@ejemplo.com" required>
        <br><br>
        <h2>Diferentes tipos de inputs</h2>
        <label for="contraseña">contraseña:</label>
        <input type="password" name="clave" id="pass">
        <br><br>
        <label for="edad">edad:</label>
        <input type="number" name="edad" id="edad" min="18" max="99">
        <br><br>
        <label for="nacimiento">fecha de nacimiento:</label>
        <input type="date" name="fecha_nac" id="nacimiento">
        <br><br>
        <p>selecciona tu plan:</p>
        <input type="radio" name="plan" id="planGratis" value="gratis">
        <label for="planGratis">plan gratis</label>
        <br><br>
        <input type="radio" name="plan" id="planPro" value="pro">
        <label for="planPro">plan pro</label>
        <br><br>
        <input type="radio" name="plan" id="planPremium" value="premium">
        <label for="planPremium">plan premium</label>
        <br><br>
        <input type="checkbox" id="terminos" name="terminos" required>
        <label for="terminos">acepto terminos y condiciones</label>
        <br><br>
        <button type="submit">enviar formulario</button>
        <button type="reset">restablecer formulario</button>
    </form>
    <form action="">
        <h2>textarea y selects</h2>
        <label for="pais">¿de q pais nos visitas?</label>
        <select name="pais" id="pais">
            <option value="">---SELECCIONE UNA OPCION---</option>
           
             <option value="CO">Colombia</option>
             <option value="AR">Argentina</option>
             <option value="ES">España</option>
             <option value="MX">Mexico</option>
             <br><br>
             <label for="mensaje">dejanos tu comentario: </label>
             <br><br>
             <textarea name="mensaje" id="mensaje" rows="4" cols="50" placeholder="Escriba aqui..."></textarea>
            
        </select>
    </form>
</body>
</html>
